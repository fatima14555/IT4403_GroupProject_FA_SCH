<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Discovery</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --card: #16161f;
      --card2: #1e1e2a;
      --accent: #e8b84b;
      --accent2: #c9963a;
      --red: #e85454;
      --green: #54c97a;
      --text: #f0eee8;
      --muted: #7a7a8c;
      --border: #2a2a38;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* navigation */
    #nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0;
      height: 60px; padding: 0 24px;
    }
    #nav .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; letter-spacing: 2px;
      color: var(--accent);
      margin-right: 32px; cursor: pointer;
      flex-shrink: 0;
    }
    .nav-links { display: flex; gap: 4px; flex: 1; }
    .nav-btn {
      background: none; border: none; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      padding: 8px 14px; border-radius: 8px; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }
    .nav-btn:hover { color: var(--text); background: var(--bg3); }
    .nav-btn.active { color: var(--accent); background: rgba(232,184,75,0.1); }
    #nav .nav-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
    #loginBtn {
      background: var(--accent); color: #000; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      padding: 8px 18px; border-radius: 8px; cursor: pointer;
      transition: all 0.2s;
    }
    #loginBtn:hover { background: var(--accent2); transform: translateY(-1px); }
    #userInfo { display: none; align-items: center; gap: 10px; }
    #userInfo span { font-size: 13px; color: var(--muted); }
    #userInfo strong { color: var(--text); }
    #logoutBtn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font-size: 12px; padding: 6px 12px; border-radius: 6px; cursor: pointer;
      transition: all 0.2s; font-family: 'DM Sans', sans-serif;
    }
    #logoutBtn:hover { border-color: var(--red); color: var(--red); }

    /* main */
    #main { padding-top: 60px; min-height: 100vh; }
    .view { display: none; }
    .view.active { display: block; }

    /* hero section */
    #heroSection {
      height: 420px; position: relative; overflow: hidden;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a1020 50%, #0d1a15 100%);
    }
    #heroSection::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(232,184,75,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 30%, rgba(84,201,122,0.05) 0%, transparent 50%);
    }
    .hero-content {
      position: relative; z-index: 1;
      padding: 80px 48px 48px;
    }
    .hero-content h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 7vw, 80px);
      letter-spacing: 3px; line-height: 1;
      color: var(--text);
      margin-bottom: 12px;
    }
    .hero-content h1 span { color: var(--accent); }
    .hero-content p {
      font-size: 16px; color: var(--muted);
      max-width: 440px; line-height: 1.6;
      margin-bottom: 28px;
    }
    .hero-search {
      display: flex; gap: 10px; max-width: 520px;
    }
    .hero-search input {
      flex: 1; background: rgba(255,255,255,0.07);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
      padding: 12px 18px; outline: none; transition: border-color 0.2s;
    }
    .hero-search input:focus { border-color: var(--accent); }
    .hero-search input::placeholder { color: var(--muted); }
    .hero-search button {
      background: var(--accent); color: #000;
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
      padding: 12px 24px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .hero-search button:hover { background: var(--accent2); transform: translateY(-1px); }

    /* main sections */
    .section { padding: 40px 48px; }
    .section-header {
      display: flex; align-items: baseline; gap: 16px;
      margin-bottom: 24px;
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: 2px; color: var(--text);
    }
    .section-sub { font-size: 13px; color: var(--muted); }

    /* grid design */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
    }

    /* movie cards */
    .movie-card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid transparent;
      position: relative;
    }
    .movie-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.6);
      border-color: var(--border);
    }
    .movie-card img {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
      display: block; background: var(--bg3);
    }
    .movie-card .card-body { padding: 12px; }
    .movie-card .card-title {
      font-size: 13px; font-weight: 600;
      color: var(--text); margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .movie-card .card-meta { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }
    .rating-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600;
      color: var(--accent);
    }
    .rating-badge::before { content: '★'; }
    .card-overlay {
      position: absolute; top: 8px; right: 8px;
      display: flex; flex-direction: column; gap: 6px;
      opacity: 0; transition: opacity 0.2s;
    }
    .movie-card:hover .card-overlay { opacity: 1; }
    .overlay-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: none; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); transition: transform 0.2s;
    }
    .overlay-btn:hover { transform: scale(1.15); }
    .fav-btn { background: rgba(232,84,84,0.85); color: #fff; }
    .watch-btn { background: rgba(84,201,122,0.85); color: #fff; }

    /* filter bar */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: 10px;
      padding: 0 48px 28px;
      align-items: center;
    }
    .filter-bar label { font-size: 13px; color: var(--muted); }
    .filter-bar select, .filter-bar input[type=text] {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
      padding: 8px 14px; border-radius: 8px; outline: none;
      cursor: pointer; transition: border-color 0.2s;
    }
    .filter-bar select:focus, .filter-bar input[type=text]:focus { border-color: var(--accent); }
    .filter-bar input[type=text] { width: 260px; }
    .filter-bar input[type=text]::placeholder { color: var(--muted); }
    .search-go-btn {
      background: var(--accent); color: #000;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      padding: 8px 18px; cursor: pointer; transition: background 0.2s;
    }
    .search-go-btn:hover { background: var(--accent2); }

    /* pagination */
    .pagination {
      display: flex; justify-content: center; gap: 8px;
      padding: 32px 0;
    }
    .page-btn {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
      padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* details view */
    .detail-hero {
      position: relative; min-height: 380px;
      display: flex; align-items: flex-end;
    }
    .detail-backdrop {
      position: absolute; inset: 0;
      background-size: cover; background-position: center top;
      filter: brightness(0.25) saturate(0.8);
    }
    .detail-backdrop::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 30%, var(--bg) 100%);
    }
    .detail-content {
      position: relative; z-index: 1;
      display: flex; gap: 32px; padding: 40px 48px 32px;
      align-items: flex-end;
    }
    .detail-poster {
      width: 180px; flex-shrink: 0;
      border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow);
    }
    .detail-poster img { width: 100%; display: block; }
    .detail-info { flex: 1; }
    .detail-info h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(32px, 5vw, 56px); letter-spacing: 2px;
      line-height: 1; margin-bottom: 10px;
    }
    .detail-info .tagline {
      font-family: 'DM Serif Display', serif;
      font-style: italic; font-size: 16px;
      color: var(--muted); margin-bottom: 14px;
    }
    .detail-meta {
      display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 18px;
    }
    .meta-chip {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 12px;
      font-size: 12px; color: var(--muted);
    }
    .meta-chip.rating { color: var(--accent); border-color: rgba(232,184,75,0.3); }
    .detail-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .action-btn {
      display: flex; align-items: center; gap: 8px;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      padding: 10px 20px; cursor: pointer; transition: all 0.2s;
    }
    .action-btn.fav { background: rgba(232,84,84,0.15); color: var(--red); border: 1px solid rgba(232,84,84,0.3); }
    .action-btn.fav:hover { background: rgba(232,84,84,0.25); }
    .action-btn.watch { background: rgba(84,201,122,0.15); color: var(--green); border: 1px solid rgba(84,201,122,0.3); }
    .action-btn.watch:hover { background: rgba(84,201,122,0.25); }
    .action-btn.active-fav { background: var(--red); color: #fff; }
    .action-btn.active-watch { background: var(--green); color: #000; }

    .detail-body { padding: 32px 48px; }
    .detail-body h2 {
      font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1.5px;
      color: var(--text); margin-bottom: 14px; margin-top: 32px;
    }
    .detail-body h2:first-child { margin-top: 0; }
    .overview { font-size: 15px; line-height: 1.7; color: #c8c6be; max-width: 700px; }
    .genres { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .genre-tag {
      background: rgba(232,184,75,0.1); border: 1px solid rgba(232,184,75,0.25);
      color: var(--accent); border-radius: 20px; padding: 4px 14px; font-size: 12px;
    }

    /* cast */
    .cast-scroll {
      display: flex; gap: 14px; overflow-x: auto;
      padding-bottom: 8px; scrollbar-width: thin;
    }
    .cast-card {
      flex-shrink: 0; width: 110px; cursor: pointer;
      text-align: center; transition: transform 0.2s;
    }
    .cast-card:hover { transform: translateY(-4px); }
    .cast-card img {
      width: 90px; height: 90px; border-radius: 50%;
      object-fit: cover; margin: 0 auto 8px;
      border: 2px solid var(--border); display: block;
      background: var(--bg3);
    }
    .cast-card .cast-name { font-size: 12px; font-weight: 600; line-height: 1.3; }
    .cast-card .cast-char { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* actor view */
    .actor-hero {
      display: flex; gap: 32px; padding: 40px 48px;
      background: linear-gradient(to bottom, var(--bg2), var(--bg));
    }
    .actor-photo {
      width: 200px; flex-shrink: 0; border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow);
    }
    .actor-photo img { width: 100%; display: block; background: var(--bg3); }
    .actor-details { flex: 1; padding-top: 12px; }
    .actor-details h1 {
      font-family: 'Bebas Neue', sans-serif; font-size: 48px;
      letter-spacing: 2px; margin-bottom: 10px;
    }
    .actor-bio {
      font-size: 14px; line-height: 1.7; color: #c8c6be;
      max-width: 600px; margin-top: 14px;
    }
    .actor-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
    .actor-meta .meta-item { font-size: 13px; }
    .actor-meta .meta-item span { color: var(--muted); margin-right: 6px; }

    /* lists view */
    .lists-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      padding: 0 48px; margin-bottom: 0;
    }
    .list-tab {
      background: none; border: none; border-bottom: 3px solid transparent;
      color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      padding: 16px 24px; cursor: pointer; transition: all 0.2s; margin-bottom: -1px;
    }
    .list-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* login view */
    #loginView {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 60px);
      background: radial-gradient(ellipse at center, rgba(232,184,75,0.04) 0%, transparent 70%);
    }
    .login-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 48px; text-align: center;
      max-width: 440px; width: 90%;
    }
    .login-box .logo-big {
      font-family: 'Bebas Neue', sans-serif; font-size: 48px;
      letter-spacing: 4px; color: var(--accent); margin-bottom: 8px;
    }
    .login-box p { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }
    .login-steps { text-align: left; margin-bottom: 28px; }
    .login-steps .step {
      display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start;
    }
    .step-num {
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(232,184,75,0.15); border: 1px solid rgba(232,184,75,0.3);
      color: var(--accent); font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .step-text { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .step-text a { color: var(--accent); text-decoration: none; }
    #startLoginBtn {
      background: var(--accent); color: #000; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
      padding: 14px 36px; border-radius: 10px; cursor: pointer; transition: all 0.2s;
      width: 100%;
    }
    #startLoginBtn:hover { background: var(--accent2); transform: translateY(-2px); }
    #authStatus { margin-top: 16px; font-size: 13px; color: var(--muted); min-height: 20px; }

    /* loading and empty states */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 20px; gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 14px; color: var(--muted); }
    .empty-state {
      text-align: center; padding: 80px 20px;
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 20px; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; color: var(--muted); }

    /* popups, known as toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 20px;
      font-size: 14px; color: var(--text);
      box-shadow: var(--shadow);
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 320px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-left: 3px solid var(--green); }
    #toast.error { border-left: 3px solid var(--red); }
    #toast.info { border-left: 3px solid var(--accent); }

    /* back button */
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px;
      padding: 8px 16px; border-radius: 8px; cursor: pointer;
      transition: all 0.2s; margin: 24px 48px 0;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* api key */
    #apiKeyBanner {
      background: rgba(232,184,75,0.1);
      border-bottom: 1px solid rgba(232,184,75,0.3);
      padding: 10px 24px;
      display: flex; align-items: center; gap: 12px;
      font-size: 13px;
    }
    #apiKeyBanner span { color: var(--accent); font-weight: 600; }
    #apiKeyBanner p { color: var(--muted); }
    #apiKeyInput {
      background: var(--bg3); border: 1px solid rgba(232,184,75,0.3);
      color: var(--text); font-family: monospace; font-size: 12px;
      padding: 6px 12px; border-radius: 6px; outline: none; width: 280px;
    }
    #saveKeyBtn {
      background: var(--accent); color: #000; border: none;
      font-size: 12px; font-weight: 700; padding: 6px 14px;
      border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }

    /* footer */
    #tmdbFooter {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 20px 48px;
      margin-top: 40px;
    }
    .footer-inner {
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    .footer-inner p { font-size: 12px; color: var(--muted); }
    .footer-inner a { font-size: 12px; color: var(--accent); text-decoration: none; }
    .footer-inner a:hover { text-decoration: underline; }

    /* responsive */
    @media (max-width: 768px) {
      .section, .filter-bar, .detail-content, .actor-hero, .detail-body { padding-left: 20px; padding-right: 20px; }
      .hero-content { padding: 60px 20px 32px; }
      .detail-content { flex-direction: column; }
      .detail-poster { width: 140px; }
      .actor-hero { flex-direction: column; }
      .lists-tabs { padding: 0 20px; }
      .back-btn { margin-left: 20px; }
      .nav-links .nav-btn:not(.active) { display: none; }
    }
  </style>
</head>
